<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register MyEvent</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
        }

        .register-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #ff7a00;
        }

        .register-box h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .register-box h3 {
            margin-bottom: 5px;
            font-weight: normal;
            color: #555;
        }

        .register-box h3 span {
            color: #ff7a00;
            font-weight: bold;
        }

        .register-box p {
            margin-bottom: 20px;
            color: #777;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #ff7a00;
            outline: none;
            box-shadow: 0 0 5px rgba(255,122,0,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #ff7a00;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #e66a00;
        }

        .login {
            margin-top: 15px;
        }

        .login a {
            color: #ff7a00;
            text-decoration: none;
            font-weight: bold;
        }

        .login a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

<div class="register-container">
    <div class="register-box">
        <h1>Register</h1>
        <h3>Bergabung di <span>MyEvent</span></h3>
        <p>Buat akun baru</p>

        <form>
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Masukkan email" required>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Masukkan username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Masukkan password" required>
            </div>

            <button type="submit">Daftar</button>
        </form>

        <p class="login">
            Sudah punya akun? <a href="login.html">Login</a>
        </p>
    </div>
</div>

</body>
</html>
