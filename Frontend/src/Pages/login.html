<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login MyEvent</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #ff7a00;
        }

        .login-box h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-box h3 span {
            color: #ff7a00;
        }

        .login-box p {
            margin-bottom: 20px;
            color: #777;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff7a00;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .register a {
            color: #ff7a00;
            text-decoration: none;
        }
    </style>

    <script>
        function login(e){
            e.preventDefault();
            window.location.href = "dasboardUser/dasboardUser.html";
        }
    </script>

</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h1>Login</h1>
        <h3>Selamat datang di <span>MyEvent</span></h3>
        <p>Masuk ke akunmu</p>

        <form onsubmit="login(event)">
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="register">
            Belum punya akun? <a href="register.html">Daftar</a>
        </p>
    </div>
</div>

</body>
</html>
